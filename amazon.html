<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon LeetCode Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;padding:24px 16px}
  .container{max-width:780px;margin:0 auto}
  h1{font-size:22px;font-weight:600;letter-spacing:-0.4px;margin-bottom:4px}
  .subtitle{font-size:13px;color:#666;margin-bottom:16px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
  .stat{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:12px 14px}
  .stat-num{font-size:22px;font-weight:600;line-height:1.2}
  .stat-lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
  .stat-num.all{color:#1a1a1a}.stat-num.easy{color:#3B6D11}.stat-num.med{color:#BA7517}.stat-num.hard{color:#A32D2D}
  .progress-bar{background:#e5e5e0;border-radius:99px;height:7px;overflow:hidden;margin-bottom:16px}
  .progress-fill{height:100%;background:#3B6D11;border-radius:99px;transition:width 0.4s ease}
  .controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .search-wrap{flex:1;min-width:180px;position:relative}
  .search-wrap input{width:100%;padding:0 10px 0 34px;height:36px;font-size:13px;background:#fff;border:1px solid #ddd;border-radius:8px;color:#1a1a1a;outline:none}
  .search-wrap input:focus{border-color:#999}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:15px;pointer-events:none}
  .tabs{display:flex;gap:4px}
  .tab{padding:0 14px;height:36px;font-size:12px;font-weight:500;border:1px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer;transition:all 0.15s}
  .tab:hover{background:#f5f5f0}
  .tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .reset-btn{padding:0 12px;height:36px;font-size:12px;font-weight:500;border:1px solid #ddd;border-radius:8px;background:#fff;color:#888;cursor:pointer}
  .reset-btn:hover{background:#fff0f0;color:#A32D2D;border-color:#f0aaaa}
  .list{background:#fff;border:1px solid #e5e5e0;border-radius:12px;overflow:hidden}
  .item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f0eb;cursor:pointer;transition:background 0.1s;user-select:none}
  .item:last-child{border-bottom:none}
  .item:hover{background:#fafaf8}
  .item.done{background:#fafff8}
  .cb{width:18px;height:18px;border:2px solid #ccc;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-size:11px;font-weight:700}
  .cb.checked{background:#3B6D11;border-color:#3B6D11;color:#fff}
  .num{font-size:11px;color:#aaa;font-family:'Courier New',monospace;min-width:40px;flex-shrink:0}
  .prob-title{font-size:13px;color:#1a1a1a;flex:1;line-height:1.4;text-decoration:none}
  .prob-title:hover{color:#3b82f6}
  .item.done .prob-title{text-decoration:line-through;color:#aaa}
  .acc{font-size:11px;color:#bbb;min-width:44px;text-align:right;flex-shrink:0}
  .badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;min-width:52px;text-align:center;flex-shrink:0}
  .badge.E{background:#EAF3DE;color:#2d5a0e}.badge.M{background:#FEF3E2;color:#9a5f0a}.badge.H{background:#FEECEC;color:#8b2020}
  .empty{padding:40px;text-align:center;color:#aaa;font-size:14px}
  .lc-link{font-size:11px;color:#3b82f6;text-decoration:none;flex-shrink:0;opacity:0.6}
  .lc-link:hover{opacity:1}
  @media(max-width:500px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .acc{display:none}
  }
</style>
</head>
<body>
<div class="container">
  <h1>Amazon LeetCode Tracker</h1>
  <div class="subtitle" id="sub">Loading…</div>
  <div class="stats">
    <div class="stat"><div class="stat-num all" id="s-done">0</div><div class="stat-lbl">Done</div></div>
    <div class="stat"><div class="stat-num easy" id="s-easy">0/152</div><div class="stat-lbl">Easy</div></div>
    <div class="stat"><div class="stat-num med" id="s-med">0/363</div><div class="stat-lbl">Medium</div></div>
    <div class="stat"><div class="stat-num hard" id="s-hard">0/103</div><div class="stat-lbl">Hard</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" placeholder="Search by name or number…" id="srch" oninput="render()">
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('all',this)">All</button>
      <button class="tab" onclick="setTab('Easy',this)">Easy</button>
      <button class="tab" onclick="setTab('Medium',this)">Medium</button>
      <button class="tab" onclick="setTab('Hard',this)">Hard</button>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
  <div class="list" id="list"></div>
</div>

const EASY_TOTAL=ALL.filter(p=>p[3]==='Easy').length;
const MED_TOTAL=ALL.filter(p=>p[3]==='Medium').length;
const HARD_TOTAL=ALL.filter(p=>p[3]==='Hard').length;

let done=new Set();
let tab='all';

function load(){
  try{
    const saved=localStorage.getItem('amz_lc_done');
    if(saved) done=new Set(JSON.parse(saved));
  }catch(e){}
  updateStats(); render();
}

function save(){
  try{ localStorage.setItem('amz_lc_done', JSON.stringify([...done])); }catch(e){}
}

function toggle(id){
  if(done.has(id)) done.delete(id); else done.add(id);
  save(); updateStats(); render();
}

function updateStats(){
  const eD=ALL.filter(p=>p[3]==='Easy'&&done.has(p[0])).length;
  const mD=ALL.filter(p=>p[3]==='Medium'&&done.has(p[0])).length;
  const hD=ALL.filter(p=>p[3]==='Hard'&&done.has(p[0])).length;
  document.getElementById('s-done').textContent=done.size+'/'+ALL.length;
  document.getElementById('s-easy').textContent=eD+'/'+EASY_TOTAL;
  document.getElementById('s-med').textContent=mD+'/'+MED_TOTAL;
  document.getElementById('s-hard').textContent=hD+'/'+HARD_TOTAL;
  const pct=Math.round(done.size/ALL.length*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('sub').textContent=pct+'% complete — '+done.size+' of '+ALL.length+' problems solved';
}

function setTab(t,el){
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  const items=ALL.filter(p=>{
    if(tab!=='all'&&p[3]!==tab) return false;
    if(q&&!p[1].toLowerCase().includes(q)&&!String(p[0]).includes(q)) return false;
    return true;
  });
  const el=document.getElementById('list');
  if(!items.length){el.innerHTML='<div class="empty">No problems match your search.</div>';return;}
  el.innerHTML=items.map(p=>{
    const ck=done.has(p[0]);
    const b=p[3][0];
    const url='https://leetcode.com/problems/'+p[1].toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')+'/';
    return `<div class="item${ck?' done':''}" onclick="toggle(${p[0]})">
      <div class="cb${ck?' checked':''}">${ck?'✓':''}</div>
      <span class="num">#${p[0]}</span>
      <a class="prob-title" href="${url}" target="_blank" onclick="event.stopPropagation()">${p[1]}</a>
      <span class="acc">${p[2]}</span>
      <span class="badge ${b}">${p[3]}</span>
      <a class="lc-link" href="${url}" target="_blank" onclick="event.stopPropagation()" title="Open on LeetCode">↗</a>
    </div>`;
  }).join('');
}

function resetAll(){
  if(!confirm('Reset all progress? This cannot be undone.')) return;
  done.clear(); save(); updateStats(); render();
}

load();
</script>
